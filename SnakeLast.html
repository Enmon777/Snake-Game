<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #000;
            color: #fff;
            font-family: Arial, sans-serif;
        }
        canvas {
            border: 2px solid #fff;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="500" height="400"></canvas>
    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        const tileSize = 20;
        const width = canvas.width / tileSize;
        const height = canvas.height / tileSize;

        let snake = [{ x: Math.floor(width / 2), y: Math.floor(height / 2) }];
        let direction = null; // Start with no direction until the player presses a key
        let fruit = { x: Math.floor(Math.random() * width), y: Math.floor(Math.random() * height) };
        let score = 0;
        let gameOver = false;
        let speed = 100;  // Initial game speed in milliseconds (lower is faster)
        let speedIncrement = 5; // Speed increment after each fruit is eaten

        function drawBoard() {
            ctx.fillStyle = "#000";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw snake
            ctx.fillStyle = "#0f0";
            snake.forEach(segment => {
                ctx.fillRect(segment.x * tileSize, segment.y * tileSize, tileSize, tileSize);
            });

            // Draw fruit
            ctx.fillStyle = "#f00";
            ctx.fillRect(fruit.x * tileSize, fruit.y * tileSize, tileSize, tileSize);

            // Draw score
            ctx.fillStyle = "#fff";
            ctx.fillText(`Score: ${score}`, 10, 20);
        }

        function update() {
            if (gameOver || direction === null) return; // Don't update if the game is over or no direction set

            // Move the snake
            const head = { x: snake[0].x + direction.x, y: snake[0].y + direction.y };

            // Check if the snake hits the wall
            if (head.x < 0 || head.x >= width || head.y < 0 || head.y >= height) {
                gameOver = true;
                alert("Game Over! Final Score: " + score);
                return;
            }

            // Check collision with itself
            for (let segment of snake) {
                if (segment.x === head.x && segment.y === head.y) {
                    gameOver = true;
                    alert("Game Over! Final Score: " + score);
                    return;
                }
            }

            snake.unshift(head);

            // Check if fruit is eaten
            if (head.x === fruit.x && head.y === fruit.y) {
                score += 10;
                fruit = { x: Math.floor(Math.random() * width), y: Math.floor(Math.random() * height) };
                // Increase speed by decreasing delay after eating a fruit
                speed = Math.max(10, speed - speedIncrement);  // Prevent speed from becoming too fast
            } else {
                snake.pop(); // Remove the last segment if fruit not eaten
            }
        }

        function gameLoop() {
            drawBoard();
            update();
            if (!gameOver) {
                setTimeout(gameLoop, speed); // Adjust the delay to make the game faster
            }
        }

        document.addEventListener("keydown", event => {
            switch (event.key) {
                case "ArrowUp":
                    if (direction?.y !== 1) direction = { x: 0, y: -1 };
                    break;
                case "ArrowDown":
                    if (direction?.y !== -1) direction = { x: 0, y: 1 };
                    break;
                case "ArrowLeft":
                    if (direction?.x !== 1) direction = { x: -1, y: 0 };
                    break;
                case "ArrowRight":
                    if (direction?.x !== -1) direction = { x: 1, y: 0 };
                    break;
            }
        });

        gameLoop();
    </script>
</body>
</html>
